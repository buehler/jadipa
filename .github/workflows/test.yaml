name: Test Lib and Bindings

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main

jobs:
  test-rust:
    name: Test Rust Library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --all-features

  build-nuget:
    name: Build Nuget Package
    uses: ./.github/workflows/build_nuget_package.yaml
    with:
      build-binaries: true

  test-dotnet:
    name: Test dotnet bindings
    runs-on: ubuntu-latest
    needs: build-nuget
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: bindings/dotnet/Jadipa/packages/
      - run: dotnet test
        working-directory: bindings/dotnet/Jadipa.Tests
