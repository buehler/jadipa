name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-crate:
    name: Publish crate
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - run: cargo publish -p jadipa --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-nuget:
    name: Build NuGet package
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/build_nuget_package.yaml
    with:
      build-binaries: true
      package-version: ${{ needs.release-please.outputs.version }}

  publish-nuget:
    name: Publish NuGet package
    needs: build-nuget
    if: needs.build-nuget.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: packages

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - run: dotnet nuget push "packages/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - run: dotnet nuget push "packages/*.snupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
