name: Build Native Binaries

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-binaries:
    name: Build binaries - ${{ matrix.target }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libjadipa.so
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            lib: libjadipa.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: jadipa.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libjadipa.dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libjadipa.dylib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - run: cargo build -p jadipa-ffi --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}
